# Fly.io — deploy API: fly launch / fly deploy
# Docs: https://fly.io/docs/languages-and-frameworks/docker/

app = "genesis-email-subscription"
primary_region = "ams"

[build]

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  # Keep at least one machine up so the release scanner keeps running (not only on HTTP traffic).
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
